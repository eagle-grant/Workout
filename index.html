<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0f19">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>30·Min</title>
<style>
  :root{
    --bg:#0b0f19; --card:#151b2b; --card2:#1c2438; --line:#26304a;
    --text:#eef2fb; --muted:#8b95ad; --accent:#4f8cff; --accent2:#37d6a3;
    --warn:#ffb454; --danger:#ff5d6c; --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text);
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overscroll-behavior:none;
  }
  #app{max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  .screen{flex:1; padding:22px 18px 40px; animation:fade .28s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  header.top{display:flex; align-items:center; gap:12px; padding:16px 18px 6px;}
  .back{
    background:var(--card); border:1px solid var(--line); color:var(--text);
    width:42px; height:42px; border-radius:12px; font-size:20px; display:flex;
    align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .back:active{transform:scale(.94);}
  .crumb{font-size:13px; color:var(--muted); letter-spacing:.3px;}
  .crumb b{color:var(--text);}

  h1{font-size:30px; line-height:1.15; margin:6px 0 4px; letter-spacing:-.5px;}
  h2{font-size:22px; margin:2px 0 4px; letter-spacing:-.3px;}
  .sub{color:var(--muted); font-size:15px; margin:0 0 26px;}

  .q{font-size:26px; font-weight:700; margin:40px 0 8px; letter-spacing:-.4px;}
  .q-sub{color:var(--muted); font-size:15px; margin-bottom:30px;}

  .choices{display:flex; flex-direction:column; gap:14px;}
  .choice{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px 20px; text-align:left; color:var(--text); cursor:pointer;
    display:flex; align-items:center; gap:16px; transition:transform .12s, border-color .2s;
  }
  .choice:active{transform:scale(.98);}
  .choice .ic{font-size:30px; width:40px; text-align:center;}
  .choice .lbl{font-size:19px; font-weight:600;}
  .choice .d{font-size:13px; color:var(--muted); margin-top:3px;}
  .choice.yes{border-color:rgba(55,214,163,.5);}
  .choice.no{border-color:var(--line);}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:8px;}
  .tile{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:24px 16px; cursor:pointer; text-align:center; color:var(--text);
    transition:transform .12s, border-color .2s; position:relative; overflow:hidden;
  }
  .tile:active{transform:scale(.96);}
  .tile .emoji{font-size:38px; display:block; margin-bottom:10px;}
  .tile .name{font-size:18px; font-weight:700;}
  .tile.abs{grid-column:1 / -1;}
  .tile::after{content:""; position:absolute; inset:0; border-radius:var(--radius);
    background:linear-gradient(135deg,rgba(79,140,255,.10),transparent 60%); pointer-events:none;}

  .pill{
    display:inline-flex; align-items:center; gap:6px; background:var(--card2);
    border:1px solid var(--line); color:var(--muted); font-size:12px; font-weight:600;
    padding:6px 11px; border-radius:999px; margin-bottom:14px;
  }
  .pill .dot{width:7px; height:7px; border-radius:50%; background:var(--accent2);}

  .block-title{font-size:13px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--accent2); margin:26px 0 12px; font-weight:700;}
  .block-title.main{color:var(--accent);}
  .block-title.finish{color:var(--warn);}

  .ex{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 16px 15px; margin-bottom:12px;
  }
  .ex-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .ex-name{font-size:17px; font-weight:700;}
  .ex-num{font-size:12px; color:var(--muted); font-weight:700; flex-shrink:0;}
  .ex-meta{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .tag{font-size:12.5px; font-weight:600; padding:5px 10px; border-radius:9px;
    background:var(--card2); border:1px solid var(--line);}
  .tag.s{color:var(--accent);} .tag.r{color:var(--accent2);} .tag.rest{color:var(--muted);}
  .ex-note{font-size:13px; color:var(--muted); margin-top:10px; line-height:1.45;}

  .rest-btn{margin-top:12px; width:100%; background:var(--card2); border:1px dashed var(--line);
    color:var(--muted); padding:10px; border-radius:11px; font-size:13px; font-weight:600; cursor:pointer;}
  .rest-btn:active{transform:scale(.99);}

  /* Timer overlay */
  #timer{position:fixed; inset:0; background:rgba(8,11,20,.94); backdrop-filter:blur(6px);
    display:none; flex-direction:column; align-items:center; justify-content:center; z-index:50;}
  #timer.show{display:flex; animation:fade .2s;}
  .ring{position:relative; width:230px; height:230px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .val{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:62px; font-weight:800; font-variant-numeric:tabular-nums;}
  .t-label{color:var(--muted); margin:22px 0 26px; font-size:15px; letter-spacing:.5px;}
  .t-btns{display:flex; gap:14px;}
  .t-btns button{background:var(--card); border:1px solid var(--line); color:var(--text);
    padding:14px 22px; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer;}
  .t-btns .go{background:var(--accent); border-color:var(--accent); color:#fff;}
  .t-adj{display:flex; gap:10px; margin-bottom:20px;}
  .t-adj button{background:var(--card); border:1px solid var(--line); color:var(--muted);
    width:54px; height:44px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;}

  footer{padding:22px 18px 30px; text-align:center; color:var(--muted); font-size:12px;}
  .hint{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; font-size:13.5px; color:var(--muted); line-height:1.5; margin-top:22px;}

  /* how-to step cards */
  .steps{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:14px;}
  .step{background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:10px 6px 10px; text-align:center; position:relative;}
  .step .n{position:absolute; top:7px; left:7px; width:19px; height:19px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;}
  .step svg{width:100%; height:84px; display:block;}
  .step .cap{font-size:11px; color:var(--muted); line-height:1.35; margin-top:5px;}
  .fig{stroke:var(--accent2); stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round;}
  .head{fill:var(--accent2); stroke:none;}
  .ground{stroke:var(--line); stroke-width:3; stroke-linecap:round;}
  .bench{stroke:var(--muted); stroke-width:5; stroke-linecap:round;}
  .arrow{stroke:var(--accent); stroke-width:3; fill:none; stroke-linecap:round;}
  .arrowhead{fill:var(--accent);}
  .weight{fill:var(--accent); stroke:none;}
  .barbar{stroke:var(--accent); stroke-width:3; stroke-linecap:round;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="app">
  <header class="top" id="topbar" style="visibility:hidden">
    <button class="back" id="backBtn">‹</button>
    <div class="crumb" id="crumb"></div>
  </header>
  <div class="screen" id="screen"></div>
  <footer>Tap “Rest” under any exercise to start a timer · Add to Home Screen for app mode</footer>
</div>

<!-- Rest timer overlay -->
<div id="timer">
  <div class="ring">
    <svg width="230" height="230" viewBox="0 0 230 230">
      <circle cx="115" cy="115" r="104" stroke="#26304a" stroke-width="14" fill="none"/>
      <circle id="ringFill" cx="115" cy="115" r="104" stroke="#37d6a3" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-dasharray="653.5" stroke-dashoffset="0"/>
    </svg>
    <div class="val" id="tVal">60</div>
  </div>
  <div class="t-label">REST</div>
  <div class="t-adj">
    <button onclick="adjust(-15)">−15</button>
    <button onclick="adjust(15)">+15</button>
    <button onclick="adjust(30)">+30</button>
  </div>
  <div class="t-btns">
    <button id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="go" onclick="closeTimer()">Done</button>
  </div>
</div>

<script>
/* ---------------- WORKOUT DATA ----------------
   equip: gym | db | bw
   Each entry -> { warmup:[...], main:[{name,sets,reps,rest,note}], finish:{...} }
------------------------------------------------- */
const MG = {
  chest:{name:"Chest", emoji:"💪"},
  back:{name:"Back", emoji:"🔙"},
  legs:{name:"Legs", emoji:"🦵"},
  shoulders:{name:"Shoulders", emoji:"🏋️"},
  biceps:{name:"Biceps", emoji:"💥"},
  triceps:{name:"Triceps", emoji:"🔨"},
  abs:{name:"Abs", emoji:"🎯"},
};

const EQUIP_LABEL = {gym:"Full gym", db:"Dumbbells + bodyweight", bw:"Bodyweight only"};

function ex(name,sets,reps,rest,note){return {name,sets,reps,rest,note:note||""};}

const WORKOUTS = {
  chest:{
    gym:{warmup:["2 min light cardio (treadmill/rower)","Arm swings + band pull-aparts ×20","1 light warm-up set on bench"],
      main:[
        ex("Barbell Bench Press",4,"8–10","90s","Control the descent, drive through your chest."),

        ex("Cable Fly (mid)",3,"12–15","60s","Squeeze at the center, slight bend in elbows."),
        ex("Chest Dips",3,"8–12","60s","Lean forward to bias the chest over triceps."),
      ], finish:ex("Push-up Burnout",1,"To failure","—","Empty the tank to end the session.")},
    db:{warmup:["2 min light cardio or jumping jacks","Arm circles + shoulder rolls ×20","1 light set of floor presses"],
      main:[
        ex("Dumbbell Bench/Floor Press",4,"10–12","75s","Full range, dumbbells travel in a slight arc."),
        ex("Incline Dumbbell Press",3,"10–12","75s","Prop feet up / use pillows if no bench."),
        ex("Dumbbell Fly",3,"12–15","60s","Deep stretch, controlled — light weight is fine."),
        ex("Close-Grip Push-ups",3,"12–15","45s","Hands under chest, elbows tucked."),
      ], finish:ex("Wide Push-up Burnout",1,"To failure","—","Wide hands to finish the chest off.")},
    bw:{warmup:["Jumping jacks 60s","Arm circles + shoulder rolls ×20","Scapular push-ups ×10"],
      main:[
        ex("Standard Push-ups",4,"12–20","60s","Body in a straight line, chest to floor."),
        ex("Decline Push-ups (feet elevated)",3,"10–15","60s","Feet on couch/chair to load upper chest."),
        ex("Wide Push-ups",3,"12–15","45s","Hands wider than shoulders for chest stretch."),
        ex("Diamond Push-ups",3,"8–12","45s","Hands together — hits inner chest & triceps."),
      ], finish:ex("Push-up AMRAP",1,"90s max reps","—","As many quality reps as possible in 90 seconds.")},
  },
  back:{
    gym:{warmup:["2 min rower or light cardio","Band pull-aparts ×20","1 light lat pulldown set"],
      main:[
        ex("Lat Pulldown",4,"10–12","75s","Pull to upper chest, squeeze shoulder blades."),
        ex("Barbell Row",4,"8–10","90s","Hinge ~45°, pull to lower ribs, flat back."),
        ex("Seated Cable Row",3,"10–12","75s","Chest tall, drive elbows straight back."),
        ex("Face Pull",3,"15","45s","Rear delts + upper back, pull to your face."),
      ], finish:ex("Straight-Arm Pulldown",2,"15","45s","Feel the lats stretch and contract.")},
    db:{warmup:["2 min light cardio","Band/towel pull-aparts ×20","Cat-cow ×10"],
      main:[
        ex("One-Arm Dumbbell Row",4,"10–12 /side","75s","Support on a bench/chair, pull to hip."),
        ex("Dumbbell Romanian Deadlift",3,"10–12","75s","Hinge at hips, back flat, feel hamstrings/back."),
        ex("Dumbbell Pullover",3,"12","60s","Lying down, stretch over head, pull to chest."),
        ex("Reverse Fly",3,"15","45s","Bent over, raise dumbbells out — rear delts/upper back."),
      ], finish:ex("Renegade Row",2,"10 /side","45s","Plank position, row one dumbbell at a time.")},
    bw:{warmup:["Jumping jacks 60s","Arm swings ×20","Cat-cow + bird dog ×10"],
      main:[
        ex("Pull-ups or Doorway Rows",4,"6–12","75s","Use a bar if available; else row on a sturdy table edge."),
        ex("Superman Hold",3,"20–30s","45s","Lift chest, arms & legs — squeeze lower back/glutes."),
        ex("Towel/Table Inverted Row",3,"10–15","60s","Lie under a table, pull chest toward the edge."),
        ex("Reverse Snow Angels",3,"15","45s","Face down, sweep arms from hips to overhead."),
      ], finish:ex("Bird Dog",2,"10 /side","30s","Slow & controlled — opposite arm/leg extension.")},
  },
  legs:{
    gym:{warmup:["3 min bike/treadmill","Leg swings ×15 /side","Bodyweight squats ×15","1 light squat set"],
      main:[
        ex("Barbell Back Squat",4,"8–10","2 min","Depth to parallel, drive through mid-foot."),
        ex("Romanian Deadlift",3,"10","90s","Hinge, slight knee bend, stretch the hamstrings."),
        ex("Leg Press",3,"12","75s","Full range, don't lock knees hard at top."),
        ex("Seated/Lying Leg Curl",3,"12–15","60s","Squeeze hamstrings, controlled negative."),
      ], finish:ex("Standing Calf Raise",3,"15–20","30s","Full stretch at bottom, pause at top.")},
    db:{warmup:["2 min light cardio","Leg swings ×15 /side","Bodyweight squats ×15"],
      main:[
        ex("Goblet Squat",4,"12–15","75s","Hold one dumbbell at chest, sit between the heels."),
        ex("Dumbbell Romanian Deadlift",3,"12","75s","Dumbbells slide down thighs, hinge at hips."),
        ex("Dumbbell Reverse Lunge",3,"10 /side","60s","Step back, knee to floor, drive up."),
        ex("Dumbbell Step-up",3,"10 /side","60s","Onto a bench/sturdy chair, full extension."),
      ], finish:ex("Dumbbell Calf Raise",3,"20","30s","Hold dumbbells, slow full-range reps.")},
    bw:{warmup:["Jumping jacks 60s","Leg swings ×15 /side","Hip circles ×10"],
      main:[
        ex("Bodyweight Squats",4,"20–25","60s","Chest up, sit back, full depth."),
        ex("Bulgarian Split Squat",3,"12 /side","60s","Rear foot on chair — this one burns."),
        ex("Reverse Lunges",3,"12 /side","60s","Controlled, knee lightly taps the floor."),
        ex("Glute Bridge",3,"20","45s","Squeeze glutes hard at the top, pause 1s."),
      ], finish:ex("Wall Sit + Calf Raises",1,"45s hold + 20 raises","—","Sit at wall, then finish with calf raises.")},
  },
  shoulders:{
    gym:{warmup:["2 min light cardio","Band pull-aparts ×20","Arm circles ×20","1 light press set"],
      main:[
        ex("Overhead Barbell Press",4,"8–10","90s","Brace core, press overhead, don't flare ribs."),
        ex("Dumbbell Lateral Raise",4,"12–15","45s","Lead with elbows, control down — no swinging."),
        ex("Arnold Press",3,"10–12","75s","Rotate palms as you press for full delt hit."),
        ex("Cable/Rear Delt Fly",3,"15","45s","Rear delts — pull wide and back."),
      ], finish:ex("Lateral Raise Drop Set",1,"To failure","—","Go lighter and rep out to finish.")},
    db:{warmup:["2 min light cardio","Arm circles ×20","Band/towel pull-aparts ×20"],
      main:[
        ex("Dumbbell Shoulder Press",4,"10–12","75s","Seated or standing, press to nearly locked out."),
        ex("Dumbbell Lateral Raise",4,"12–15","45s","Slight forward lean, lead with the elbows."),
        ex("Front Raise",3,"12","45s","Raise to eye level, control the lowering."),
        ex("Bent-Over Rear Delt Fly",3,"15","45s","Hinge forward, raise dumbbells out to sides."),
      ], finish:ex("Arnold Press",2,"12","45s","Rotate palms through the press to finish.")},
    bw:{warmup:["Jumping jacks 60s","Arm circles ×20","Scapular push-ups ×10"],
      main:[
        ex("Pike Push-ups",4,"8–12","60s","Hips high, head toward floor — targets delts."),
        ex("Wall Walks",3,"3–5","60s","Walk feet up a wall toward a handstand."),
        ex("Lateral Raises (water bottles/bags)",3,"15","45s","Any light load — cans, bottles, backpack."),
        ex("Plank Shoulder Taps",3,"20 taps","45s","Stay stable, minimal hip sway."),
      ], finish:ex("Pike Push-up Burnout",1,"To failure","—","Rep out pike push-ups to finish.")},
  },
  biceps:{
    gym:{warmup:["1 min light cardio","Arm swings ×20","1 light curl set"],
      main:[
        ex("Barbell Curl",4,"10–12","60s","Elbows pinned to sides, no swinging."),
        ex("Incline Dumbbell Curl",3,"10–12","60s","Lie back on incline — big biceps stretch."),
        ex("Hammer Curl",3,"12","45s","Neutral grip — hits brachialis & forearms."),
        ex("Cable Curl",3,"15","45s","Constant tension, squeeze at the top."),
      ], finish:ex("21s (Barbell)",1,"21 reps","—","7 bottom-half + 7 top-half + 7 full.")},
    db:{warmup:["1 min light cardio","Arm swings ×20","1 light curl set"],
      main:[
        ex("Dumbbell Curl",4,"10–12","60s","Alternate or together, full range."),
        ex("Hammer Curl",3,"12","45s","Neutral grip, control the negative."),
        ex("Incline Dumbbell Curl",3,"10–12","60s","Recline for a deeper stretch."),
        ex("Concentration Curl",3,"12 /side","45s","Elbow on inner thigh, strict squeeze."),
      ], finish:ex("Dumbbell 21s",1,"21 reps","—","7 bottom + 7 top + 7 full range.")},
    bw:{warmup:["Jumping jacks 60s","Arm swings ×20","Scapular pulls ×10"],
      main:[
        ex("Chin-ups",4,"5–10","75s","Underhand grip; use bands/feet assist if needed."),
        ex("Towel Curls (backpack)",3,"12–15","60s","Loop a towel through a bag, curl the load."),
        ex("Isometric Towel Curl",3,"20s /arm","45s","Pull up with one arm, resist with the other."),
        ex("Doorframe Curls",3,"12","45s","Grip a doorframe edge and curl your bodyweight."),
      ], finish:ex("Chin-up Hold",1,"Max hold","—","Chin over bar, hold as long as you can.")},
  },
  triceps:{
    gym:{warmup:["1 min light cardio","Arm swings ×20","1 light pushdown set"],
      main:[
        ex("Close-Grip Bench Press",4,"10–12","75s","Hands shoulder-width, elbows tucked."),
        ex("Cable Pushdown",3,"12–15","45s","Elbows pinned, full lockout each rep."),
        ex("Overhead Cable/DB Extension",3,"12","60s","Deep stretch behind the head."),
        ex("Triceps Dips",3,"8–12","60s","Stay upright to bias the triceps."),

      ], finish:ex("Dips AMRAP",1,"60s max","—","As many chair dips as possible in a minute.")},

    gym:{warmup:["1 min light cardio","Cat-cow ×10","Dead bug ×10"],

        ex("Russian Twist (plate)",3,"20 twists","45s","Feet up, rotate side to side."),
      ], finish:ex("Bicycle Crunch",1,"60s","—","Elbow to opposite knee, steady rhythm.")},
    db:{warmup:["1 min light cardio","Cat-cow ×10","Dead bug ×10"],
      main:[
        ex("Weighted Russian Twist",4,"20 twists","45s","Hold a dumbbell, rotate fully each side."),

        ex("Side Plank",3,"30s /side","45s","Stack hips, hold a straight line."),
      ], finish:ex("Plank Hold",1,"Max hold","—","Brace hard, breathe, hold to failure.")},
    bw:{warmup:["Jumping jacks 60s","Cat-cow ×10","Dead bug ×10"],
      main:[
        ex("Crunches",4,"20–25","30s","Curl up, don't yank on your neck."),
        ex("Leg Raises",3,"15","30s","Lower slowly, keep lower back pressed down."),
        ex("Plank",3,"45s","45s","Straight line head to heels, brace core."),
        ex("Bicycle Crunches",3,"20 /side","30s","Elbow to opposite knee, controlled."),
        ex("Mountain Climbers",3,"30s","30s","Fast knees, hips low and stable."),
      ], finish:ex("Russian Twists",1,"60s","—","Feet up if you can, rotate side to side.")},
  },
};

/* ---------------- HOW-TO DIAGRAMS ----------------
   Small SVG helpers compose consistent stick-figure poses.
   DIAG = movement templates (3 steps each); diagramKey() maps
   an exercise name onto the closest template.
--------------------------------------------------- */
const SV=(i)=>`<svg viewBox="0 0 100 100">${i}</svg>`;
const F =(x1,y1,x2,y2)=>`<line class="fig" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
const BN=(x1,y1,x2,y2)=>`<line class="bench" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
const PL=(p)=>`<polyline class="fig" points="${p}"/>`;

const DIAG_RULES=[
  [/pike|wall walk/,'pikepushup'],
  [/push-?up|push up/,'pushup'],
  [/pushdown/,'pushdown'],
  [/\bdip/,'dip'],
  [/pullover/,'pullover'],
  [/pulldown|pull-?up|chin/,'pulldown'],
  [/face pull|rear delt|reverse fly|snow angel/,'reardelt'],
  [/lateral raise/,'lateralraise'],
  [/front raise/,'frontraise'],
  [/skullcrusher/,'skullcrusher'],
  [/overhead.*extension|extension.*overhead/,'overheadext'],
  [/kickback/,'kickback'],
  [/arnold|shoulder press|overhead press|overhead barbell press/,'ohp'],
  [/leg curl/,'legcurl'],
  [/hammer/,'hammercurl'],
  [/21s|curl/,'curl'],
  [/incline.*press/,'inclinepress'],
  [/bench press|floor press|close-grip.*press|close-grip bench/,'benchpress'],
  [/\bfly/,'fly'],
  [/renegade|\brow/,'row'],
  [/leg press/,'legpress'],
  [/wall sit/,'wallsit'],
  [/bulgarian|split squat/,'lunge'],
  [/squat/,'squat'],
  [/lunge/,'lunge'],
  [/step-?up/,'stepup'],
  [/romanian|deadlift|\brdl/,'hinge'],
  [/calf/,'calfraise'],
  [/glute bridge|bridge/,'glutebridge'],
  [/side plank/,'sideplank'],
  [/plank/,'plank'],
  [/bicycle/,'bicycle'],
  [/crunch/,'crunch'],
  [/leg raise/,'legraise'],
  [/russian twist/,'russiantwist'],
  [/mountain climber/,'mountainclimber'],
  [/superman/,'superman'],
  [/bird dog/,'birddog'],
];
function diagramKey(name){
  const n = name.toLowerCase();
  for(const [re,key] of DIAG_RULES){ if(re.test(n)) return key; }
  return null;
}
function stepsHTML(name){
  const key = diagramKey(name);
  const d = key && DIAG[key];
  if(!d) return "";
  return `<div class="steps">` + d.s.map((svg,i)=>
    `<div class="step"><span class="n">${i+1}</span>${svg}<div class="cap">${d.caps[i]}</div></div>`
  ).join("") + `</div>`;
}

/* ---------------- NAVIGATION ---------------- */
const state = {equip:null, muscle:null, view:"gymQ"};
const screen = document.getElementById("screen");
const topbar = document.getElementById("topbar");
const crumb = document.getElementById("crumb");
const backBtn = document.getElementById("backBtn");

backBtn.onclick = ()=>{
  if(state.view==="workout"){ render("muscles"); }
  else if(state.view==="muscles"){ render("dbQ"); }
  else if(state.view==="dbQ"){ render("gymQ"); }
};

function setTop(show, text){
  topbar.style.visibility = show ? "visible" : "hidden";
  crumb.innerHTML = text || "";
}

function render(view){
  state.view = view;
  window.scrollTo(0,0);
  if(view==="gymQ") return renderGymQ();
  if(view==="dbQ") return renderDbQ();
  if(view==="muscles") return renderMuscles();
  if(view==="workout") return renderWorkout();
}

function renderGymQ(){
  setTop(false);
  screen.innerHTML = `
    <h1>30·Min</h1>
    <p class="sub">Quick, focused workouts by muscle group.</p>
    <div class="q">Are we at the gym today? 🏋️</div>
    <div class="q-sub">This decides what equipment your workout uses.</div>
    <div class="choices">
      <button class="choice yes" onclick="pickGym(true)">
        <span class="ic">✅</span>
        <span><span class="lbl">Yes, full gym</span><span class="d">Barbells, machines, cables, benches</span></span>
      </button>
      <button class="choice no" onclick="pickGym(false)">
        <span class="ic">🏠</span>
        <span><span class="lbl">No</span><span class="d">Training at home / on the go</span></span>
      </button>
    </div>`;
}
function pickGym(isGym){
  if(isGym){ state.equip="gym"; render("muscles"); }
  else { render("dbQ"); }
}

function renderDbQ(){
  setTop(true, `<b>Not at the gym</b>`);
  screen.innerHTML = `
    <div class="q">Do you have dumbbells? 🏋️‍♂️</div>
    <div class="q-sub">Even one pair unlocks a lot more.</div>
    <div class="choices">
      <button class="choice yes" onclick="pickDb(true)">
        <span class="ic">✅</span>
        <span><span class="lbl">Yes, I have dumbbells</span><span class="d">Dumbbells + bodyweight movements</span></span>
      </button>
      <button class="choice no" onclick="pickDb(false)">
        <span class="ic">🙅</span>
        <span><span class="lbl">No equipment</span><span class="d">Pure bodyweight — works anywhere</span></span>
      </button>
    </div>`;
}
function pickDb(hasDb){ state.equip = hasDb ? "db" : "bw"; render("muscles"); }

function renderMuscles(){
  setTop(true, `Equipment: <b>${EQUIP_LABEL[state.equip]}</b> · <span style="color:var(--accent)">change</span>`);
  crumb.style.cursor="pointer";
  crumb.onclick = ()=>render("gymQ");
  const order = ["chest","back","legs","shoulders","biceps","triceps","abs"];
  let tiles = order.map(k=>{
    const m = MG[k];
    return `<button class="tile ${k==='abs'?'abs':''}" onclick="pickMuscle('${k}')">
      <span class="emoji">${m.emoji}</span><span class="name">${m.name}</span></button>`;
  }).join("");
  screen.innerHTML = `
    <h2>Pick a muscle group</h2>
    <p class="sub">Each is a ~30-minute session.</p>
    <div class="grid">${tiles}</div>
    <div class="hint">💡 Tip: warm up properly, leave 1–2 reps in the tank on early sets, and push the finisher.</div>`;
}
function pickMuscle(k){ state.muscle=k; render("workout"); }

function swapEquip(){
  const nextEquip = {gym:'db', db:'bw', bw:null};
  const next = nextEquip[state.equip];
  if(next){ state.equip = next; render("workout"); }
}

function renderWorkout(){
  const m = MG[state.muscle];
  const w = WORKOUTS[state.muscle][state.equip];
  setTop(true, `<b>${m.name}</b> · ${EQUIP_LABEL[state.equip]}`);
  crumb.style.cursor="default"; crumb.onclick=null;

  const warm = w.warmup.map(x=>`<li>${x}</li>`).join("");
  const main = w.main.map((e,i)=>exCard(e,i+1)).join("");
  const fin = finCard(w.finish);

  screen.innerHTML = `
    <span class="pill"><span class="dot"></span> ~30 min · ${m.emoji} ${m.name}</span>
    <h2>${m.name} Workout</h2>
    <p class="sub">${EQUIP_LABEL[state.equip]} · ${w.main.length} main lifts + finisher</p>

    <div class="block-title">🔥 Warm-up · ~4 min</div>
    <div class="ex"><ul style="margin:0; padding-left:18px; line-height:1.9; font-size:15px;">${warm}</ul></div>

    <div class="block-title main">🏋️ Main Sets · ~22 min</div>
    ${main}

    <div class=”block-title finish”>⚡ Finisher · ~2 min</div>
    ${fin}

    <div class=”hint”>Rest timers are suggestions — tap “Rest” to run one. Adjust weight so the last 1–2 reps are tough but clean.</div>
    ${swapEquipBtn()}`;
}

function swapEquipBtn(){
  const nextEquip = {gym:'db', db:'bw', bw:null};
  const next = nextEquip[state.equip];
  if(!next) return `<div style=”text-align:center; margin-top:26px; color:var(--muted); font-size:13px;”>You're already at bodyweight — can't swap lower.</div>`;
  return `<div style=”text-align:center; margin-top:26px;”>
    <button style=”background:var(--card); border:1px solid var(--line); color:var(--muted); padding:12px 18px; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer;” onclick=”swapEquip()”>
      ⚙️ Equipment not available — use ${EQUIP_LABEL[next]} instead
    </button>
  </div>`;
}

function exCard(e,n){
  return `<div class="ex">
    <div class="ex-head"><span class="ex-name">${e.name}</span><span class="ex-num">${n}</span></div>
    <div class="ex-meta">
      <span class="tag s">${e.sets} sets</span>
      <span class="tag r">${e.reps}</span>
      <span class="tag rest">Rest ${e.rest}</span>
    </div>
    ${e.note?`<div class="ex-note">${e.note}</div>`:""}
    ${stepsHTML(e.name)}
    ${restSeconds(e.rest)?`<button class="rest-btn" onclick="openTimer(${restSeconds(e.rest)})">⏱️ Start ${restSeconds(e.rest)}s rest timer</button>`:""}
  </div>`;
}
function finCard(e){
  return `<div class="ex" style="border-color:rgba(255,180,84,.4)">
    <div class="ex-head"><span class="ex-name">${e.name}</span><span class="ex-num">🏁</span></div>
    <div class="ex-meta"><span class="tag s">${e.sets} set</span><span class="tag r" style="color:var(--warn)">${e.reps}</span></div>
    ${e.note?`<div class="ex-note">${e.note}</div>`:""}
    ${stepsHTML(e.name)}
  </div>`;
}
function restSeconds(rest){
  const m = String(rest).match(/(\d+)\s*s/); if(m) return parseInt(m[1]);
  const min = String(rest).match(/(\d+)\s*min/); if(min) return parseInt(min[1])*60;
  return 0;
}

/* ---------------- REST TIMER ---------------- */
let tTotal=60, tLeft=60, tInt=null, tPaused=false;
const CIRC=653.5;
const timerEl=document.getElementById("timer");
const tVal=document.getElementById("tVal");
const ringFill=document.getElementById("ringFill");
const pauseBtn=document.getElementById("pauseBtn");

function openTimer(sec){
  tTotal=sec; tLeft=sec; tPaused=false;
  pauseBtn.textContent="Pause";
  timerEl.classList.add("show");
  drawTimer();
  clearInterval(tInt);
  tInt=setInterval(tick,1000);
}
function tick(){
  if(tPaused) return;
  tLeft--;
  if(tLeft<=0){ tLeft=0; drawTimer(); done(); return; }
  drawTimer();
}
function drawTimer(){
  tVal.textContent=tLeft;
  const frac = tTotal? tLeft/tTotal : 0;
  ringFill.style.strokeDashoffset = CIRC*(1-frac);
  ringFill.setAttribute("stroke", tLeft<=5 ? "#ff5d6c" : "#37d6a3");
}
function adjust(d){ tLeft=Math.max(0,tLeft+d); tTotal=Math.max(tTotal,tLeft); drawTimer(); }
function togglePause(){ tPaused=!tPaused; pauseBtn.textContent=tPaused?"Resume":"Pause"; }
function closeTimer(){ clearInterval(tInt); timerEl.classList.remove("show"); }
function done(){
  clearInterval(tInt);
  tVal.textContent="Go!";
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.frequency.value=880; o.type="sine";
    g.gain.setValueAtTime(0.001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    o.start(); o.stop(ctx.currentTime+0.5);
  }catch(e){}
  setTimeout(closeTimer,900);
}

/* ---------------- INIT ---------------- */
render("gymQ");
</script>
</body>
</html>
